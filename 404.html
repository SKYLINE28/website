<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TwentyEgg | 404 — File Not Found</title>

    <!-- SEO Meta Tags -->
    <meta name="description" content="404 — File not found. The page you're looking for doesn't exist.">
    <meta name="author" content="Damar Rifaldi Mutakin">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#D97757">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥚</text></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=VT323&display=swap" as="style">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="css/style.css">
    <script>
        let currentTheme = localStorage.getItem('theme');
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('theme')) {
            currentTheme = urlParams.get('theme');
            try { localStorage.setItem('theme', currentTheme); } catch (e) { }
        } else if (!currentTheme) {
            currentTheme = 'light';
        }
        document.documentElement.setAttribute('data-theme', currentTheme);
    </script>
</head>

<body class="error-page-body">

    <div class="container container-center flex-center" style="min-height: 90vh;">
        <main class="error-container reveal">
            <section class="pixel-panel" style="text-align: center;">
                <div class="error-code">404</div>
                <h1 class="error-title">ERROR_404: FILE_NOT_FOUND</h1>

                <div class="glitch-bar-container">
                    <div class="glitch-bar"></div>
                </div>
                <p class="glitch-label">LOADING... FAILED ■■■</p>

                <div class="error-messages">
                    <p><span class="err-prompt">C:\SYSTEM&gt;</span> Attempting to locate file...</p>
                    <p><span class="err-prompt">C:\SYSTEM&gt;</span> ERROR: Requested resource does not exist.</p>
                    <p><span class="err-prompt">C:\SYSTEM&gt;</span> FATAL: PATH_NOT_RESOLVED — 0xDEAD</p>
                    <p><span class="err-prompt">C:\SYSTEM&gt;</span> Recommendation: Return to home directory.</p>
                </div>

                <a href="index.html" class="pixel-btn action-btn" style="width: auto; display: inline-flex;">
                    <i class="fa-solid fa-house"></i> [RETURN_HOME.exe]
                </a>
            </section>
        </main>
    </div>

    <script src="js/theme.js"></script>
