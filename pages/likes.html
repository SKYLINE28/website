<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TwentyEgg | My Favorites</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <button id="theme-toggle" class="pixel-btn theme-toggle" aria-label="Toggle Dark Mode">
        <i class="fa-solid fa-moon"></i>
    </button>
    <a href="system_menu.html" class="pixel-btn back-btn" aria-label="Go Back">
        <i class="fa-solid fa-arrow-left"></i>&nbsp; Kembali
    </a>

    <div class="container support-container">
        <section class="pixel-panel feature-box" style="width: 100%; max-width: 700px; margin: 0 auto;">
            <div class="panel-header">
                    <h3>> FAVORITES_LOG.txt</h3>
                </div>
                <div class="panel-body" style="text-align: center; padding: 4rem 1rem;">
                    <i class="fa-solid fa-screwdriver-wrench fa-beat-fade" 
                       style="font-size: 4rem; margin-bottom: 2rem; color: var(--accent-color);"></i>
                    
                    <h2 id="loading-text" style="color: var(--accent-color); font-size: 2rem; margin-bottom: 1rem; font-family: 'VT323', monospace;">> SYSTEM_UPGRADING_</h2>
                    
                    <div style="font-family: monospace; font-size: 1.8rem; letter-spacing: 2px;">
                        <span id="loading-bar" style="color: var(--text-color);">[░░░░░░░░░░░░░░░░░░░░]</span>
                        <span id="loading-percentage" style="display: inline-block; width: 60px; text-align: left; margin-left: 1rem;">0%</span>
                    </div>
                    
                    <p style="margin-top: 2rem; font-size: 1.2rem; color: var(--text-color); opacity: 0.8;">
                        Halaman ini sedang dalam tahap perbaikan / under construction.
                    </p>
                </div>
        </section>
    </div>

    <script src="../js/script.js"></script>
    <script src="../js/progress.js"></script>
</body>

</html>
