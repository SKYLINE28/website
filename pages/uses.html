    <script>
        let currentTheme = localStorage.getItem('theme');
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('theme')) {
            currentTheme = urlParams.get('theme');
            try { localStorage.setItem('theme', currentTheme); } catch (e) { }
        } else if (!currentTheme) {
            currentTheme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', currentTheme);
    </script>
</head>

<body>
    <!-- Scroll Progress Bar -->
    <div id="scroll-progress"></div>

    <nav class="floating-menu-container">
        <button id="main-menu-btn" class="pixel-btn main-menu-btn" aria-label="Open Menu">
            <i class="fa-solid fa-bars"></i>
        </button>
        <div id="drop-menu" class="pixel-panel drop-menu">
            <button id="theme-toggle" class="pixel-btn menu-item">
                <i class="fa-solid fa-moon"></i> <span>Dark Mode</span>
            </button>
            <a href="../index.html" class="pixel-btn menu-item">
                <i class="fa-solid fa-house"></i> Home
            </a>
            <a href="courses.html" class="pixel-btn menu-item">
                <i class="fa-solid fa-book"></i> Courses
            </a>
            <a href="now.html" class="pixel-btn menu-item">

            <a href="uses.html" class="pixel-btn menu-item">

            </a>
        </div>

    <main class="container" style="max-width: 700px; margin: 0 auto; min-height: 80vh;">
        <section class="pixel-panel reveal mt-4">
            <div class="panel-header">
                <h1 style="font-size: 1.6rem;">> USES.exe</h1>
                <p style="font-size: 1.1rem; color: var(--accent-color); margin-top: 0.3rem;">Tools, Hardware & Software</p>
            </div>
            <div class="panel-body" id="uses-content">
                <p style="white-space: pre-wrap; animation: blink 1s infinite alternate; color: var(--accent-color);">FETCHING DATA...</p>
            </div>
        </section>
    </main>

    <!-- Scroll To Top Button -->
    <button id="scroll-top" class="pixel-btn scroll-top-btn" aria-label="Scroll to top">
        <i class="fa-solid fa-arrow-up"></i> <span class="hidden-mobile-text">TOP</span>
    </button>

    <!-- Core Scripts — NO defer (critical) -->
    <script src="../js/core/theme.js"></script>
    <script src="../js/core/main.js"></script>
    
    <!-- Component Scripts — defer -->
    <script src="../js/components/nav.js" defer></script>
    <script src="../js/components/terminal.js" defer></script>
    
    <!-- Effect Scripts — defer -->
    <script src="../js/effects/scroll.js" defer></script>
    <script src="../js/effects/reveal.js" defer></script>
    <script src="../js/effects/particles.js" defer></script>
    <script src="../js/effects/fireworks.js" defer></script>
    <script src="../js/effects/mousetrail.js" defer></script>
    <script src="../js/effects/clipboard.js" defer></script>
    <script src="../js/effects/konami.js" defer></script>

    <!-- Uses Data Fetcher -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetch('../data/uses.json')
                .then(r => r.json())
                .then(data => {
                    const container = document.getElementById('uses-content');
                    container.innerHTML = '';
                    
                    const icons = {
                        hardware: '<i class="fa-solid fa-microchip"></i>',
                        software: '<i class="fa-brands fa-windows"></i>',
                        services: '<i class="fa-solid fa-cloud"></i>'
                    };

                    for (const [category, items] of Object.entries(data)) {
                        const section = document.createElement('div');
                        section.className = 'now-section';
                        
                        const label = document.createElement('span');
                        label.className = 'now-label';
                        label.innerHTML = `${icons[category] || '>'} ${category.toUpperCase()}`;
                        section.appendChild(label);
                        
                        const content = document.createElement('div');
                        content.className = 'now-content';
                        const ul = document.createElement('ul');
                        items.forEach(item => {
                            const li = document.createElement('li');
                            li.innerHTML = `<strong>${item.name}</strong> <span style="opacity:0.8; font-size:1.1rem; display:block; padding-left:1.2rem;">- ${item.desc}</span>`;
                            ul.appendChild(li);
                        });
                        content.appendChild(ul);
                        
                        section.appendChild(content);
                        container.appendChild(section);
                    }
                })
                .catch(() => {
                    document.getElementById('uses-content').innerHTML = '<p>&gt; ERROR: Failed to load USES.exe.</p>';
                });
        });
    </script>
</body>
