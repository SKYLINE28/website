    <script>
        let currentTheme = localStorage.getItem('theme');
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('theme')) {
            currentTheme = urlParams.get('theme');
            try { localStorage.setItem('theme', currentTheme); } catch (e) { }
        } else if (!currentTheme) {
            currentTheme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', currentTheme);
    </script>

    <div class="container container-center flex-center" style="min-height: 80vh;">
        <main class="grid-2 reveal" style="width: 100%;">
            <!-- Report Bug Section -->
            <section class="pixel-panel flex-center text-center" style="flex-direction: column;">
                <div class="panel-header" style="width: 100%;">
                    <h3>> SUPPORT_CENTER.exe</h3>
                </div>
                <div class="panel-body flex-center" style="flex-direction: column; width: 100%;">
                    <i class="fa-solid fa-bug system-menu-icon text-center" aria-hidden="true" style="margin-bottom: 1rem;"></i>
                    <p class="text-center mb-3">Menemukan bug, error, atau sekadar ingin menyapa? Kirim pesan via form ini!</p>

                    <form action="https://formspree.io/f/xleqvoov" method="POST" class="contact-form" id="support-form" style="width: 100%; max-width: 400px; margin: 0 auto;">
                        <!-- Honeypot -->
                        <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off" />
                        
                        <div class="form-group">
                            <label for="name">> NAMA_LENGKAP.str</label>
                            <input type="text" id="name" name="name" required placeholder="Masukkan nama..." class="pixel-input">
                        </div>
                        <div class="form-group">
                            <label for="email">> EMAIL_AKTIF.str</label>
                            <input type="email" id="email" name="_replyto" required placeholder="alamat@email.com" class="pixel-input">
                        </div>
                        <div class="form-group">
                            <label for="message">> PESAN_LOG.txt</label>
                            <textarea id="message" name="message" required placeholder="Tulis laporan atau pesan di sini..." rows="4" class="pixel-input"></textarea>
                        </div>
                        
                        <div id="form-status" class="form-status mt-2 text-center" style="display: none;"></div>
                        <div class="flex-center mt-2">
                            <button type="submit" class="pixel-btn action-btn" style="width: 100%;">
                                <span><i class="fa-solid fa-paper-plane"></i> SUBMIT_LOG</span>
                            </button>
                        </div>
                    </form>
                </div>
            </section>

            <!-- Donation Section -->

                </div>
                <div class="panel-body flex-center" style="flex-direction: column;">

                    <p class="mb-2">Makasih Jajanannya Semoga Berkah dan Bikin Saya Jadi Semangat</p>
